name: staygo

services:
  # ---- MongoDB ----
  mongo:
    image: mongo:7
    container_name: staygo-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - staygo-net

  # ---- Backend (Express API) ----
  backend:
    build: ./backend
    container_name: staygo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/stay_go_db
      - MONGO_FALLBACK_URI=mongodb://mongo:27017/stay_go_db
      - CLIENT_URL=http://localhost:5173
      - CLIENT_URLS=http://localhost:5173,http://localhost:5174
    volumes:
      - ./backend/src:/app/src
      - backend-uploads:/app/uploads
    depends_on:
      - mongo
    networks:
      - staygo-net

  # ---- Frontend (Vite Dev Server) ----
  frontend:
    build: ./frontend
    container_name: staygo-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - staygo-net

volumes:
  mongo-data:
  backend-uploads:

networks:
  staygo-net:
    driver: bridge
